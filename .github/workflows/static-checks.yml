name: Static Checks

on:
  pull_request:
    branches: [main, dev]

jobs:
  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Retrieve Git history, needed to verify commits

    - name: Set up Node.js environment
      uses: ./.github/actions/setup-project
      with:
        node-version: 24.x

    - name: Typecheck
      run: pnpm run check-types
  
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js environment
      uses: ./.github/actions/setup-project
      with:
        node-version: 24.x

    - name: Lint
      run: pnpm run lint:ci

  migration-required:
    name: Migration Required
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: PAYLOAD_SECRET
      CRON_SECRET: CRON_SECRET
      PREVIEW_SECRET: PREVIEW_SECRET
    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js environment
      uses: ./.github/actions/setup-project
      with:
        node-version: 24.x

    - name: Check Pragmatic Papers
      run: pnpm --filter pragmatic-papers run migrate:create --skip-empty

    - name: Pragmatic Papers Migration Check
      run: |
        output=$(pnpm --filter pragmatic-papers run migrate:create --skip-empty 2>&1)
        echo "$output"
        if echo "$output" | grep -q "Migration created at"; then
          echo "❌ A migration was created, which means the schema is out of sync"
          echo "Please run 'pnpm migrate:create' locally and commit the migration"
          exit 1
        else
          echo "✅ No migration needed - schema is up to date"
        fi

    - name: DGG Political Action Migration Check
      run: |
        output=$(pnpm --filter dgg-political-action run migrate:create --skip-empty 2>&1)
        echo "$output"
        if echo "$output" | grep -q "Migration created at"; then
          echo "❌ A migration was created, which means the schema is out of sync"
          echo "Please run 'pnpm migrate:create' locally and commit the migration"
          exit 1
        else
          echo "✅ No migration needed - schema is up to date"
        fi
  