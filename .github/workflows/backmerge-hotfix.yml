name: "Auto Back-merge Hotfix to Dev"

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  back-merge:
    # Only run if merged and it was a hotfix branch
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Back-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
          # Create the specific name required by your Step 7 instructions at pragmatic-papers/wiki/Creating-Hotfix-Releases
          NEW_BRANCH: "chore/back-merge-${{ github.event.pull_request.head.ref }}"
        run: |
          # 1. Setup git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Create the new chore branch from main (to get the latest hotfix + tags)
          git checkout main
          git checkout -b "$NEW_BRANCH"

          # 3. Push the new branch to origin
          git push origin "$NEW_BRANCH"

          # 4. Create the PR body following your template
          PR_BODY=$(cat <<EOF
          Automated back-merge of hotfix merged into main.
          
          **If there are conflicts with the existing PRs in dev, follow these steps to resolve:**
          
          \`\`\`bash
          # 1. Sync your local
          git fetch origin
          
          # 2. Checkout this back-merge branch
          git checkout $NEW_BRANCH
          
          # 3. Pull the latest dev to resolve conflicts locally
          git pull origin dev
          
          # 4. Resolve & Push
          git add .
          git commit -m "chore: resolve conflicts with dev"
          git push origin $NEW_BRANCH
          \`\`\`
          EOF
          )

          # 5. Create the PR to dev
          gh pr create \
            --base dev \
            --head "$NEW_BRANCH" \
            --title "chore: back-merge ${{ github.event.pull_request.head.ref }} to dev" \
            --body "$PR_BODY"
