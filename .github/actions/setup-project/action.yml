name: "Setup PNPM"
description: "Sets up Node.js, PNPM, and installs dependencies"

inputs:
  node-version:
    description: Node.js version
    required: true
  gh-font-read-token:
    description: "GitHub Token for private font packages"
    required: false
    default: ""
  restore-nextjs-cache:
    description: Whether to restore Next.js build cache
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: "10.13.1"

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: "https://npm.pkg.github.com"
      env:
        NODE_AUTH_TOKEN: ${{ inputs.gh-font-read-token }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
