[options]
addons_path = /mnt/extra-addons,/opt/odoo/addons
data_dir = /var/lib/odoo

; === Database Settings ===
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
; dbfilter = odoo

; === Development Settings ===
; debug_mode = True
; log_level = debug
; logfile = /var/log/odoo/odoo.log

; === Performance Settings ===
; limit_memory_hard = 2684354560
; limit_memory_soft = 2147483648
; limit_request = 8192
; limit_time_cpu = 60
; limit_time_real = 120
workers = 0

; === Web Interface ===
xmlrpc = True
xmlrpc_port = 8069
xmlrpcs = True
xmlrpcs_port = 8071

; === Long Polling ===
longpolling_port = 8072

; === Email / SMTP ===
; smtp_server = localhost
; smtp_port = 25
; smtp_ssl = False
; smtp_user = False
; smtp_password = False

; === Other Options ===
; admin_passwd = admin
; csv_internal_sep = ,
; db_name = False
; db_template = template1
; dbfilter = .*
; email_from = False
; list_db = True
; log_db = False
; max_cron_threads = 2
; osv_memory_age_limit = 1.0
; osv_memory_count_limit = False
