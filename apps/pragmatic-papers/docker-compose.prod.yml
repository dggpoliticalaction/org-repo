version: '3.9'

services:
  app:
    build:
      context: ../..
      dockerfile: apps/pragmatic-papers/Dockerfile
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-payload}
      - POSTGRES_USER=${POSTGRES_USER:-payload}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-payload}
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-payload}
      - POSTGRES_USER=${POSTGRES_USER:-payload}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-payload}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
