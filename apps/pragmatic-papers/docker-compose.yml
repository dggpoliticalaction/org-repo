services:
  postgres-pragmatic-papers:
    container_name: pragmatic-papers-postgres-dev
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pragmatic-papers
    ports:
      - "9000:5432"
    volumes:
      - pragmatic_papers_postgres_data:/var/lib/postgresql/data

volumes:
  pragmatic_papers_postgres_data:
    name: pragmatic_papers_postgres_data
