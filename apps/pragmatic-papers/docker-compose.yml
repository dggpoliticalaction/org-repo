networks:
  appnet:
    name: ${COMPOSE_PROJECT_NAME:-pragmatic-papers}_dev
    external: true

services:
  app:
    build:
      context: ../..
      dockerfile: apps/pragmatic-papers/Dockerfile
      args:
        - PAYLOAD_SECRET=${PAYLOAD_SECRET}
        - POSTGRES_HOST=${POSTGRES_HOST}
        - POSTGRES_PORT=${POSTGRES_PORT}
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - DATABASE_URI=${DATABASE_URI}
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URI=${DATABASE_URI}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - appnet

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

volumes:
  pgdata:
