# Docker Compose for DGG Political Action Deployment
# Designed for use with Coolify
# 
# This file sets up:
# - PostgreSQL database (latest version)
# - DGG Political Action application
#
# Environment variables should be configured in Coolify
# For detailed deployment instructions, see COOLIFY_DEPLOYMENT.md

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dgg_political_action}
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Warning: Exposing PostgreSQL port publicly is a security risk
      # Remove this in production or use a firewall to restrict access
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # DGG Political Action Application
  dgg-political-action:
    build:
      context: ..
      dockerfile: dockerfiles/DigitalGroundGame.Dockerfile
      args:
        NODE_VERSION: 22.12.0
        NODE_ENV: production
        BUILD_ENV: ${BUILD_ENV:-staging}
    container_name: dgg_political_action
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # Database
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Public URL
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
