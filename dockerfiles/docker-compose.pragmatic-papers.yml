# Docker Compose for Pragmatic Papers Deployment
# Designed for use with Coolify
# 
# This file sets up:
# - PostgreSQL database (latest version)
# - Pragmatic Papers application
#
# Environment variables should be configured in Coolify
# For detailed deployment instructions, see COOLIFY_DEPLOYMENT.md

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pragmatic_papers}
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Warning: Exposing PostgreSQL port publicly is a security risk
      # Remove this in production or use a firewall to restrict access
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Pragmatic Papers Application
  pragmatic-papers:
    build:
      context: ..
      dockerfile: dockerfiles/PragmaticPapers.Dockerfile
      args:
        NODE_VERSION: 22.21.1
        NODE_ENV: production
        BUILD_ENV: ${BUILD_ENV:-staging}
        DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pragmatic_papers}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        S3_REGION: ${S3_REGION}
        S3_BUCKET: ${S3_BUCKET}
        S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
        S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
        S3_ENDPOINT: ${S3_ENDPOINT}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    container_name: pragmatic_papers
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # Database
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pragmatic_papers}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Storage Configuration
      # Set USE_LOCAL_STORAGE=true to use local file storage instead of S3
      # This is recommended for staging and preview environments
      USE_LOCAL_STORAGE: ${USE_LOCAL_STORAGE:-false}
      # S3 Storage (only used when USE_LOCAL_STORAGE=false)
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      # Public URLs
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    ports:
      - "3000:3000"
    volumes:
      # Mount local media directory when using local storage
      # This persists uploaded files across container restarts
      - media_data:/app/apps/pragmatic-papers/public/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
